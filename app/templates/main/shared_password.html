{% extends "base.html" %}
{% block title %}Protected analysis{% endblock %}
{% block main_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <a href="{{ url_for('main.landing') }}" class="nav-brand">
      DataLens <span class="brand-ai">AI</span>
    </a>
    <h1>Protected analysis</h1>
    <p>Enter the password to view this shared analysis.</p>
  </div>

  {% if error %}
  <div class="flash flash-error" style="margin-bottom:1rem;">{{ error }}</div>
  {% endif %}

  <form method="POST" class="auth-form">
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter password" required autofocus>
    </div>
    <button type="submit" class="btn-primary btn-full">View analysis</button>
  </form>
</div>
{% endblock %}
