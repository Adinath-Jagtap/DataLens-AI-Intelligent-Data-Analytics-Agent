{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block main_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <a href="{{ url_for('main.landing') }}" class="nav-brand">DataLens <span class="brand-ai">AI</span></a>
    <h1>Create account</h1>
    <p>Free forever. No credit card required.</p>
  </div>

  <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
    <div class="field">
      <label for="display_name">Your name</label>
      <input type="text" id="display_name" name="display_name" placeholder="Aditya Kumar" required autofocus>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Min 6 characters" required>
    </div>
    <button type="submit" class="btn-primary btn-full">Create account</button>
  </form>

  <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
</div>
{% endblock %}
