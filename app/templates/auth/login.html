{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block main_class %}auth-page{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <a href="{{ url_for('main.landing') }}" class="nav-brand">DataLens <span class="brand-ai">AI</span></a>
    <h1>Welcome back</h1>
    <p>Sign in to your account.</p>
  </div>

  <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn-primary btn-full">Sign in</button>
  </form>

  <p class="auth-switch">No account? <a href="{{ url_for('auth.register') }}">Register for free</a></p>
</div>
{% endblock %}
