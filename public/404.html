<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DataLens AI</title>
    <script>
      // GitHub Pages SPA fix
      // Redirects /analysis/123 → /?/analysis/123
      // React Router picks it back up on load
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?/' + l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '') + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
